<div class="container">
    <h2>Create New User</h2>
    
    <div *ngIf="success" class="alert alert-success">
      User created successfully!
    </div>
    
    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>
    
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Name</label>
        <input 
          type="text" 
          id="name" 
          formControlName="name" 
          class="form-control"
          [ngClass]="{'is-invalid': submitted && userForm.controls['name'].errors}" 
        />
        <div *ngIf="submitted && userForm.controls['name'].errors" class="invalid-feedback">
          <div *ngIf="userForm.controls['name'].errors['required']">Name is required</div>
        </div>
      </div>
      
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-control"
          [ngClass]="{'is-invalid': submitted && userForm.controls['email'].errors}" 
        />
        <div *ngIf="submitted && userForm.controls['email'].errors" class="invalid-feedback">
          <div *ngIf="userForm.controls['email'].errors['required']">Email is required</div>
          <div *ngIf="userForm.controls['email'].errors['email']">Email must be valid</div>
        </div>
      </div>
      
      <div class="form-group">
        <label for="age">Age (optional)</label>
        <input 
          type="number" 
          id="age" 
          formControlName="age" 
          class="form-control" 
        />
      </div>
      
      <button type="submit" class="btn btn-primary mt-3">Create User</button>
    </form>
  </div>
